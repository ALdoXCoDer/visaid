<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AgencyVisa Form Pengajuan</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

<h1>INFORMASI TAMBAHAN DIBUTUHKAN</h1>
<p>Harap isi data dengan benar sebelum dikirim</p>

<form id="visaForm">

<!-- ================== INFORMASI PRIBADI ================== -->
<h2>INFORMASI PRIBADI</h2>

<input id="nama" placeholder="Nama Lengkap" required>
<input id="nik" placeholder="National ID / NIK">
<input id="status" placeholder="Status Perkawinan">

<input id="alamat" placeholder="Alamat Rumah">
<input id="kota" placeholder="Kota">
<input id="provinsi" placeholder="Provinsi">
<input id="kodepos" placeholder="Kode Pos">
<input id="negara" placeholder="Negara/Wilayah">

<input id="hp" placeholder="Nomor Telepon Utama" required>
<input id="email" placeholder="Alamat Email">

<input id="facebook" placeholder="Facebook">
<input id="instagram" placeholder="Instagram">

<!-- ================== KELUARGA ================== -->
<h2>INFORMASI KELUARGA</h2>

<input id="ayah" placeholder="Nama Ayah">
<input id="tglayah" placeholder="Tanggal Lahir Ayah">

<input id="ibu" placeholder="Nama Ibu">
<input id="tglibu" placeholder="Tanggal Lahir Ibu">

<input id="pasangan" placeholder="Nama Pasangan">
<input id="tgllahirpasangan" placeholder="Tempat, Tgl Lahir Pasangan">
<input id="tglmenikah" placeholder="Tanggal Menikah">
<input id="tglcerai" placeholder="Tanggal Cerai (jika ada)">

<!-- ================== PEKERJAAN ================== -->
<h2>INFORMASI PEKERJAAN</h2>

<input id="job" placeholder="Pekerjaan Utama">
<input id="company" placeholder="Nama Perusahaan">

<input id="alamatkerja" placeholder="Alamat Perusahaan">
<input id="kotakerja" placeholder="Kota Kerja">
<input id="provinsikerja" placeholder="Provinsi Kerja">
<input id="kodeposkerja" placeholder="Kode Pos Kerja">

<input id="tglmulai" placeholder="Tanggal Mulai Bekerja">
<input id="telpkantor" placeholder="Telepon Kantor">
<input id="gaji" placeholder="Gaji Bulanan">

<input id="tugas" placeholder="Tugas / Jabatan">

<!-- ================== PENDIDIKAN ================== -->
<h2>PENDIDIKAN</h2>

<h3>SMP</h3>
<input id="smp_nama" placeholder="Nama Sekolah">
<input id="smp_alamat" placeholder="Alamat Sekolah">
<input id="smp_mulai" placeholder="Mulai">
<input id="smp_lulus" placeholder="Lulus">

<h3>SMA</h3>
<input id="sma_nama" placeholder="Nama Sekolah">
<input id="sma_alamat" placeholder="Alamat Sekolah">
<input id="sma_jurusan" placeholder="Jurusan">
<input id="sma_mulai" placeholder="Mulai">
<input id="sma_lulus" placeholder="Lulus">

<h3>PERGURUAN TINGGI</h3>
<input id="kuliah_nama" placeholder="Nama Universitas">
<input id="kuliah_alamat" placeholder="Alamat Universitas">
<input id="kuliah_jurusan" placeholder="Bidang / Program Studi">
<input id="kuliah_mulai" placeholder="Mulai">
<input id="kuliah_lulus" placeholder="Lulus">

<!-- ================== LAINNYA ================== -->
<h2>LAINNYA</h2>

<input id="bahasa" placeholder="Bahasa yang dikuasai">
<input id="riwayatnegara" placeholder="Negara yang pernah dikunjungi">

<button type="submit">KIRIM PENGAJUAN</button>

</form>

</div>

<script>
document.getElementById("visaForm").addEventListener("submit", function(e){
  e.preventDefault();

  let data = {
    nama: nama.value,
    nik: nik.value,
    status: status.value,
    alamat: alamat.value,
    kota: kota.value,
    provinsi: provinsi.value,
    kodepos: kodepos.value,
    negara: negara.value,
    hp: hp.value,
    email: email.value,

    job: job.value,
    company: company.value,

    ayah: ayah.value,
    ibu: ibu.value,
    pasangan: pasangan.value,

    pendidikan: sma_nama.value,

    time: new Date().toLocaleString()
  };

  // SIMPAN KE ADMIN
  let leads = JSON.parse(localStorage.getItem("leads") || "[]");
  leads.push(data);
  localStorage.setItem("leads", JSON.stringify(leads));

  // WHATSAPP MESSAGE
  let msg =
`🔥 AGENCYVISA FULL SUBMISSION

Nama: ${data.nama}
Negara: ${data.negara}
Pekerjaan: ${data.job}
HP: ${data.hp}
Email: ${data.email}

Status: PENDING REVIEW`;

  window.location.href =
  "https://wa.me/628816906696?text=" + encodeURIComponent(msg);

});
</script>

</body>
  </html>

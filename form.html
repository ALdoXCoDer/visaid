<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AgencyVisa Form</title>

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  padding:30px;
}
.box{
  max-width:900px;
  margin:auto;
  background:#111827;
  padding:25px;
  border-radius:12px;
}
input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  color:white;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>🔥 AgencyVisa Full Submission</h2>

<form id="visaForm">

<h3>INFORMASI PRIBADI</h3>

<input name="nama" placeholder="Nama Lengkap" required>
<input name="nik" placeholder="NIK">
<input name="status" placeholder="Status Perkawinan">
<input name="alamat" placeholder="Alamat">
<input name="kota" placeholder="Kota">
<input name="provinsi" placeholder="Provinsi">
<input name="kodepos" placeholder="Kode Pos">

<input name="telepon" placeholder="Nomor Telepon (WA)" required>
<input name="email" placeholder="Email">

<h3>INFORMASI KELUARGA</h3>
<textarea name="keluarga"></textarea>

<h3>INFORMASI PEKERJAAN</h3>
<textarea name="pekerjaan"></textarea>

<h3>INFORMASI PENDIDIKAN</h3>
<textarea name="pendidikan"></textarea>

<h3>LAINNYA</h3>
<textarea name="lainnya"></textarea>

<button type="submit">KIRIM PENGAJUAN</button>

</form>
</div>

<script>
document.getElementById("visaForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const f = this;

  // =========================
  // FORMAT FULL (EMAIL / ADMIN)
  // =========================
  const fullData = `
INFORMASI TAMBAHAN DIBUTUHKAN

INFORMASI PRIBADI
Nama Lengkap : ${f.nama.value}
NIK : ${f.nik.value}
Status Perkawinan : ${f.status.value}
Alamat : ${f.alamat.value}
Kota : ${f.kota.value}
Provinsi : ${f.provinsi.value}
Kode Pos : ${f.kodepos.value}
Telepon : ${f.telepon.value}
Email : ${f.email.value}

INFORMASI KELUARGA
${f.keluarga.value}

INFORMASI PEKERJAAN
${f.pekerjaan.value}

INFORMASI PENDIDIKAN
${f.pendidikan.value}

LAINNYA
${f.lainnya.value}

HARAP PERIKSA KEMBALI SEBELUM DIKIRIM
`;

  // =========================
  // KIRIM KE FORMSPREE
  // =========================
  await fetch("https://formspree.io/f/xzdwvnnq", {
    method: "POST",
    headers: {
      "Accept": "application/json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: fullData
    })
  });

  // =========================
  // FORMAT WA (FULL SAMA)
  // =========================
  const waText = `
INFORMASI TAMBAHAN DIBUTUHKAN

INFORMASI PRIBADI
Nama Lengkap : ${f.nama.value}
NIK : ${f.nik.value}
Status Perkawinan : ${f.status.value}
Alamat : ${f.alamat.value}
Kota : ${f.kota.value}
Provinsi : ${f.provinsi.value}
Kode Pos : ${f.kodepos.value}
Telepon : ${f.telepon.value}
Email : ${f.email.value}

INFORMASI KELUARGA
${f.keluarga.value}

INFORMASI PEKERJAAN
${f.pekerjaan.value}

INFORMASI PENDIDIKAN
${f.pendidikan.value}

LAINNYA
${f.lainnya.value}

HARAP PERIKSA KEMBALI SEBELUM DIKIRIM
`;

  // =========================
  // FIX NOMOR WA INDONESIA
  // =========================
  let phone = f.telepon.value.replace(/\D/g,'');

  if(phone.startsWith("0")){
    phone = "62" + phone.substring(1);
  }

  if(!phone.startsWith("62")){
    phone = "62" + phone;
  }

  // redirect WA
  window.location.href =
    `https://wa.me/${phone}?text=${encodeURIComponent(waText)}`;

});
</script>

</body>
</html>

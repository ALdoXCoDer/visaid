<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AgencyVisa Form</title>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  padding:30px;
}
.box{
  max-width:900px;
  margin:auto;
  background:#111827;
  padding:25px;
  border-radius:12px;
}
input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  color:white;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>🔥 AgencyVisa Full Submission</h2>

<form id="visaForm" action="https://formspree.io/f/xzdwvnnq" method="POST">

<h3>DATA UTAMA</h3>

<input name="nama" placeholder="Nama Lengkap" required>
<input name="nik" placeholder="NIK">
<input name="status" placeholder="Status Perkawinan">
<input name="alamat" placeholder="Alamat Lengkap">
<input name="kota" placeholder="Kota">
<input name="provinsi" placeholder="Provinsi">
<input name="kodepos" placeholder="Kode Pos">
<input name="telepon" placeholder="Nomor Telepon" required>
<input name="email" placeholder="Email">

<textarea name="keluarga" placeholder="INFORMASI KELUARGA"></textarea>
<textarea name="pekerjaan" placeholder="INFORMASI PEKERJAAN"></textarea>
<textarea name="pendidikan" placeholder="INFORMASI PENDIDIKAN"></textarea>
<textarea name="lainnya" placeholder="Bahasa & Riwayat Negara"></textarea>

<textarea id="full_data" name="full_data" hidden></textarea>

<button type="submit">KIRIM</button>
</form>

</div>

<script>
document.getElementById("visaForm").addEventListener("submit", function(){

const f = this;

/* =========================
   FORMAT FULL (FIXED)
========================= */

const full = `
INFORMASI TAMBAHAN DIBUTUHKAN

INFORMASI PRIBADI
Nama Lengkap : ${f.nama.value}
National ID/NIK : ${f.nik.value}
1. Status Perkawinan : ${f.status.value}
2. Alamat Rumah : ${f.alamat.value}
• Kota : ${f.kota.value}
• Provinsi : ${f.provinsi.value}
• Kode Pos : ${f.kodepos.value}
3. Nomor Telepon Utama : ${f.telepon.value}
4. Alamat Email : ${f.email.value}

INFORMASI KELUARGA
${f.keluarga.value}

INFORMASI PEKERJAAN
${f.pekerjaan.value}

INFORMASI PENDIDIKAN
${f.pendidikan.value}

LAINNYA
${f.lainnya.value}

HARAP PERIKSA KEMBALI SEBELUM DIKIRIM
`;

document.getElementById("full_data").value = full;


/* =========================
   WHATSAPP (FULL FORMAT SAMA)
========================= */

const waText = `
INFORMASI TAMBAHAN DIBUTUHKAN

INFORMASI PRIBADI
Nama Lengkap : ${f.nama.value}
National ID/NIK : ${f.nik.value}
1. Status Perkawinan : ${f.status.value}
2. Alamat Rumah : ${f.alamat.value}
• Kota : ${f.kota.value}
• Provinsi : ${f.provinsi.value}
• Kode Pos : ${f.kodepos.value}
3. Nomor Telepon Utama : ${f.telepon.value}
4. Alamat Email : ${f.email.value}

INFORMASI KELUARGA
${f.keluarga.value}

INFORMASI PEKERJAAN
${f.pekerjaan.value}

INFORMASI PENDIDIKAN
${f.pendidikan.value}

LAINNYA
${f.lainnya.value}

HARAP PERIKSA KEMBALI SEBELUM DIKIRIM
`;

/* =========================
   WA AUTO OPEN
========================= */

setTimeout(()=>{
window.open(
`https://wa.me/62${f.telepon.value.replace(/^0/,'')}?text=${encodeURIComponent(waText)}`,
"_blank"
);
},800);

});
</script>

</body>
</html>

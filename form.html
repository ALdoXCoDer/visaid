<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AgencyVisa - Multi Step System</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body{
  margin:0;
  font-family:Inter;
  background:#0b1220;
  color:white;
}

.bg{
  position:fixed;
  inset:0;
  background:url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  filter:brightness(0.25);
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.1);
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.12);
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.next{background:#22c55e;color:white;width:100%;}
.prev{background:#334155;color:white;width:48%;}
.submit{background:linear-gradient(90deg,#22c55e,#06b6d4);color:white;width:100%;}

.step{
  display:none;
}

.step.active{
  display:block;
}

.progress{
  height:8px;
  background:#1e293b;
  border-radius:20px;
  margin-bottom:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#06b6d4);
  transition:0.3s;
}

h2{color:#38bdf8}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<h2>🌍 AGENCY VISA MULTI STEP SYSTEM</h2>

<div class="progress"><div class="bar" id="bar"></div></div>

<form id="visaForm">

<!-- STEP 1 -->
<div class="card step active">
<h3>STEP 1 - INFORMASI PRIBADI</h3>

<input name="nama" placeholder="Nama Lengkap">
<input name="nik" placeholder="NIK">
<input name="status" placeholder="Status Perkawinan">
<input name="telepon" placeholder="WhatsApp">
<input name="email" placeholder="Email">

<button type="button" class="next" onclick="nextStep()">LANJUT</button>
</div>

<!-- STEP 2 -->
<div class="card step">
<h3>STEP 2 - ALAMAT & PEKERJAAN</h3>

<input name="alamat" placeholder="Alamat">
<input name="kota" placeholder="Kota">
<input name="provinsi" placeholder="Provinsi">

<input name="job" placeholder="Pekerjaan">
<input name="company" placeholder="Perusahaan">

<div style="display:flex;gap:10px;">
<button type="button" class="prev" onclick="prevStep()">KEMBALI</button>
<button type="button" class="next" onclick="nextStep()">LANJUT</button>
</div>
</div>

<!-- STEP 3 -->
<div class="card step">
<h3>STEP 3 - KELUARGA</h3>

<input name="ayah" placeholder="Nama Ayah">
<input name="ibu" placeholder="Nama Ibu">
<input name="pasangan" placeholder="Nama Pasangan">

<div style="display:flex;gap:10px;">
<button type="button" class="prev" onclick="prevStep()">KEMBALI</button>
<button type="button" class="next" onclick="nextStep()">LANJUT</button>
</div>
</div>

<!-- STEP 4 -->
<div class="card step">
<h3>STEP 4 - BAHASA & NEGARA</h3>

<textarea name="bahasa" placeholder="Bahasa yang dikuasai"></textarea>
<textarea name="negara" placeholder="Negara yang pernah dikunjungi"></textarea>

<div style="display:flex;gap:10px;">
<button type="button" class="prev" onclick="prevStep()">KEMBALI</button>
<button type="button" class="submit" onclick="submitForm()">KIRIM APLIKASI</button>
</div>
</div>

</form>

</div>

<script>

let step = 0;
const steps = document.querySelectorAll(".step");

function showStep(i){
  steps.forEach((s,idx)=>{
    s.classList.toggle("active", idx===i);
  });

  document.getElementById("bar").style.width = ((i+1)/steps.length)*100 + "%";
}

function nextStep(){
  if(step < steps.length-1){
    step++;
    showStep(step);
  }
}

function prevStep(){
  if(step > 0){
    step--;
    showStep(step);
  }
}

function submitForm(){
  const f = document.getElementById("visaForm");

  const data = `
🔥 AGENCY VISA MULTI STEP SUBMISSION

PRIBADI
Nama: ${f.nama.value}
NIK: ${f.nik.value}
Status: ${f.status.value}
WA: ${f.telepon.value}
Email: ${f.email.value}

ALAMAT
${f.alamat.value}, ${f.kota.value}, ${f.provinsi.value}

PEKERJAAN
${f.job.value} - ${f.company.value}

KELUARGA
Ayah: ${f.ayah.value}
Ibu: ${f.ibu.value}
Pasangan: ${f.pasangan.value}

BAHASA
${f.bahasa.value}

NEGARA
${f.negara.value}

STATUS: NEW APPLICATION
`;

  // Formspree
  fetch("https://formspree.io/f/xzdwvnnq",{
    method:"POST",
    headers:{
      "Accept":"application/json",
      "Content-Type":"application/json"
    },
    body:JSON.stringify({message:data})
  });

  // WhatsApp ADMIN
  window.location.href =
  "https://wa.me/628816906696?text="+encodeURIComponent(data);
}

</script>

</body>
</html>

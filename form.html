<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AgencyVisa Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

<h1>Pengajuan Visa AgencyVisa</h1>

<form id="visaForm">

<!-- STEP 1 -->
<div id="step1">
  <h3>Data Pribadi</h3>

  <input id="nama" placeholder="Nama Lengkap" required>
  <input id="email" placeholder="Email">
  <input id="hp" placeholder="No WhatsApp">

  <button type="button" onclick="nextStep(2)">Lanjut</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
  <h3>Pilih Negara</h3>

  <select id="negara">
    <option>Amerika Serikat</option>
    <option>Inggris</option>
    <option>Jepang</option>
    <option>Schengen</option>
  </select>

  <input id="pekerjaan" placeholder="Pekerjaan">

  <button type="button" onclick="nextStep(3)">Lanjut</button>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
  <h3>Konfirmasi</h3>
  <p>Pastikan data sudah benar sebelum dikirim</p>

  <button type="submit">Kirim Sekarang</button>
</div>

</form>

</div>

<script>
let step = 1;

function nextStep(n){
  document.getElementById("step"+step).style.display="none";
  document.getElementById("step"+n).style.display="block";
  step = n;
}

document.getElementById("visaForm").addEventListener("submit", function(e){
  e.preventDefault();

  let nama = document.getElementById("nama").value;
  let email = document.getElementById("email").value;
  let hp = document.getElementById("hp").value;
  let negara = document.getElementById("negara").value;
  let pekerjaan = document.getElementById("pekerjaan").value;

  let pesan =
`🔥 AgencyVisa Submission

Nama: ${nama}
Negara: ${negara}
Pekerjaan: ${pekerjaan}
Email: ${email}
No HP: ${hp}

Tolong follow up user ini.`;

  window.location.href =
  "https://wa.me/628816906696?text=" + encodeURIComponent(pesan);

});
</script>

</body>
</html>

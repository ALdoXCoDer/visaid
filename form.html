<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AgencyVisa Submission</title>

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  padding:30px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#111827;
  padding:25px;
  border-radius:12px;
}
input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  color:white;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
}
h2,h3{
  color:#22c55e;
}
</style>

</head>

<body>

<div class="container">
<h2>🔥 AGENCY VISA - SUBMISSION FORM</h2>

<form id="visaForm">

<h3>INFORMASI PRIBADI</h3>

<input name="nama" placeholder="Nama Lengkap" required>
<input name="nik" placeholder="NIK">
<input name="status" placeholder="Status Perkawinan">
<input name="alamat" placeholder="Alamat Lengkap">
<input name="kota" placeholder="Kota">
<input name="provinsi" placeholder="Provinsi">
<input name="kodepos" placeholder="Kode Pos">

<input name="telepon" placeholder="Nomor Telepon Client" required>
<input name="email" placeholder="Email Client">

<h3>INFORMASI KELUARGA</h3>
<textarea name="keluarga"></textarea>

<h3>INFORMASI PEKERJAAN</h3>
<textarea name="pekerjaan"></textarea>

<h3>INFORMASI PENDIDIKAN</h3>
<textarea name="pendidikan"></textarea>

<h3>LAINNYA</h3>
<textarea name="lainnya"></textarea>

<button type="submit">KIRIM PENGAJUAN</button>

</form>
</div>

<script>
document.getElementById("visaForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const f = this;

  // =========================
  // FULL FORMAT (EMAIL + ADMIN)
  // =========================
  const fullData = `
🔥 AGENCYVISA FULL SUBMISSION

INFORMASI PRIBADI
Nama Lengkap : ${f.nama.value}
NIK : ${f.nik.value}
Status Perkawinan : ${f.status.value}
Alamat : ${f.alamat.value}
Kota : ${f.kota.value}
Provinsi : ${f.provinsi.value}
Kode Pos : ${f.kodepos.value}

Telepon Client : ${f.telepon.value}
Email Client : ${f.email.value}

INFORMASI KELUARGA
${f.keluarga.value}

INFORMASI PEKERJAAN
${f.pekerjaan.value}

INFORMASI PENDIDIKAN
${f.pendidikan.value}

LAINNYA
${f.lainnya.value}

STATUS: NEW VISA APPLICATION
`;

  // =========================
  // KIRIM KE FORMSPREE
  // =========================
  await fetch("https://formspree.io/f/xzdwvnnq", {
    method: "POST",
    headers: {
      "Accept": "application/json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: fullData
    })
  });

  // =========================
  // WHATSAPP ADMIN (KAMU)
  // =========================
  const adminWA = "628816906696";

  window.location.href =
    `https://wa.me/${adminWA}?text=${encodeURIComponent(fullData)}`;

});
</script>

</body>
</html>
